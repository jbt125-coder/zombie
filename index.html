/* =========================================================
   GAME MODE + LOOP
========================================================= */
var gameMode = 'title';
var waveTrans = false;
var BR = null;

/* =========================================================
   BARREL CONGA BONUS ROUND
========================================================= */
function startBonusRound(mainState) {
  sfxStopAllHorns();
  bonusSkyTheme = pickSkyTheme();
  document.getElementById('airBtn').style.display = 'none';
  document.getElementById('cogBtn').style.display = 'none';
  BR = {
    mainState: mainState,
    frame: 0,
    playerX: W / 2,
    playerY: H * 0.70,
    playerSpeed: 4,
    joyDx: 0, joyActive: false, joyBaseX: 0, joyTouchId: -1, fireTouchId: -1,
    bullets: [],
    zombies: [],
    shots: 0, hits: 0,
    linesComplete: 0,
    totalLines: 4,
    phase: 'barrel',
    barrel: null,
    done: false, endTimer: 0,
    floats: []
  };
  brSpawnBarrel();
  canvas.addEventListener('touchstart', brOnTouchStart, { passive: false });
  canvas.addEventListener('touchmove',  brOnTouchMove,  { passive: false });
  canvas.addEventListener('touchend',   brOnTouchEnd,   { passive: false });
  canvas.addEventListener('mousedown',  brOnMouseDown);
  canvas.addEventListener('mousemove',  brOnMouseMove);
  canvas.addEventListener('mouseup',    brOnMouseUp);
}

function brSpawnBarrel() {
  var margin = 60;
  var bx = margin + Math.random() * (W - margin * 2);
  var by = H * 0.15 + Math.random() * (H * 0.50);
  // First line always barrel; after that random barrel or car-shaped target
  BR.barrel = { x: bx, y: by, lit: false, burnTimer: 0 };
  BR.phase = 'barrel';
  BR.zombies = [];
  addBrFloat(bx, by - 34, 'SHOOT THE BARREL!', '#ffaa00', true);
}

function brSpawnLine() {
  BR.zombies = [];
  var entry;
  if (BR.linesComplete === 0) {
    entry = 'top';
  } else if (BR.barrel) {
    // Pick the side FARTHEST from the barrel
    var bx = BR.barrel.x, by = BR.barrel.y;
    var distTop   = by;                          // distance from top edge
    var distLeft  = bx;                          // distance from left edge
    var distRight = W - bx;                      // distance from right edge
    var maxDist = Math.max(distTop, distLeft, distRight);
    if (maxDist === distTop)        entry = 'top';
    else if (maxDist === distLeft)  entry = 'left';
    else                            entry = 'right';
  } else {
    entry = ['top','left','right'][Math.floor(Math.random()*3)];
  }
  for (var i = 0; i < 5; i++) {
    var sx, sy;
    if (entry === 'top') {
      sx = W*0.2 + Math.random()*W*0.6; sy = -40 - i*36;
    } else if (entry === 'left') {
      sx = -40 - i*36; sy = H*0.1 + Math.random()*H*0.5;
    } else {
      sx = W+40 + i*36; sy = H*0.1 + Math.random()*H*0.5;
    }
    BR.zombies.push({ x: sx, y: sy, alive: true, index: i, zigT: i*0.6,
      entry: entry, circleT: i*0.4, circleR: 0 });
  }
  BR.phase = 'conga';
}

function addBrFloat(x, y, text, color, big) {
  if (!BR) return;
  BR.floats.push({ x: x, y: y, text: text, color: color, big: big, alpha: 1, vy: -1.2 });
}

function brJoyZone(tx, ty) { return tx < W * 0.42 && ty > H * 0.72; }
function brFireZone(tx, ty) { return tx > W * 0.60 && ty > H * 0.72; }

function brOnTouchStart(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (brFireZone(t.clientX, t.clientY) && BR.fireTouchId === -1) {
      BR.fireTouchId = t.identifier; brFire();
    } else if (brJoyZone(t.clientX, t.clientY) && BR.joyTouchId === -1) {
      BR.joyActive = true; BR.joyTouchId = t.identifier;
      BR.joyBaseX = t.clientX; BR.joyDx = 0;
    }
  }
}
function brOnTouchMove(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.identifier === BR.joyTouchId)
      BR.joyDx = Math.max(-1, Math.min(1, (t.clientX - BR.joyBaseX) / 45));
  }
}
function brOnTouchEnd(e) {
  e.preventDefault();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.identifier === BR.joyTouchId)  { BR.joyActive = false; BR.joyDx = 0; BR.joyTouchId = -1; }
    if (t.identifier === BR.fireTouchId) { BR.fireTouchId = -1; }
  }
}
function brOnMouseDown(e) {
  if (brFireZone(e.clientX, e.clientY)) brFire();
  else if (brJoyZone(e.clientX, e.clientY)) { BR.joyActive = true; BR.joyBaseX = e.clientX; BR.joyDx = 0; }
}
function brOnMouseMove(e) {
  if (BR && BR.joyActive) BR.joyDx = Math.max(-1, Math.min(1, (e.clientX - BR.joyBaseX) / 45));
}
function brOnMouseUp(e) { if (BR) { BR.joyActive = false; BR.joyDx = 0; } }

function brFire() {
  if (!BR || BR.done || BR.bullets.length >= 2) return;
  BR.shots++;
  BR.bullets.push({ x: BR.playerX, y: BR.playerY - 24, vy: -13 });
  playTone(900, 'square', 0.09, 0.04);
}

function brTick_inner() {
  if (!BR) return;
  BR.frame++;
  if (!BR.done) brUpdate();
  else BR.endTimer++;
  brDraw();
  if (BR.done && BR.endTimer >= 220) brFinish();
}

function brUpdate() {
  BR.playerX += BR.joyDx * BR.playerSpeed;
  BR.playerX = Math.max(18, Math.min(W - 18, BR.playerX));

  BR.bullets = BR.bullets.filter(function(b) {
    b.y += b.vy;
    if (BR.barrel && !BR.barrel.lit && BR.phase === 'barrel') {
      var dx = b.x - BR.barrel.x, dy = b.y - BR.barrel.y;
      if (Math.sqrt(dx*dx + dy*dy) < 26) {
        BR.barrel.lit = true; BR.hits++;
        spawnParticles(BR.barrel.x, BR.barrel.y, '#ff6600', 12);
        addBrFloat(BR.barrel.x, BR.barrel.y - 30, 'BARREL LIT!', '#ff6600', true);
        playTone(300, 'sawtooth', 0.2, 0.3);
        setTimeout(function() { if (BR) brSpawnLine(); }, 600);
        return false;
      }
    }
    if (BR.phase === 'conga') {
      for (var zi = 0; zi < BR.zombies.length; zi++) {
        var z = BR.zombies[zi];
        if (!z.alive) continue;
        if (Math.abs(b.x - z.x) < 18 && Math.abs(b.y - z.y) < 18) {
          z.alive = false; BR.hits++;
          spawnParticles(z.x, z.y, '#44ff88', 8);
          addBrFloat(z.x, z.y - 10, 'HIT!', '#44ff88', false);
          playTone(200, 'sawtooth', 0.14, 0.1);
          return false;
        }
      }
    }
    return b.y > 0;
  });

  // Barrel burn timer — but don't extinguish until conga line is done
  if (BR.barrel && BR.barrel.lit && BR.phase !== 'conga') {
    BR.barrel.burnTimer++;
    if (BR.barrel.burnTimer > 300) BR.barrel = null;
  }

  if (BR.phase === 'conga' && BR.barrel) {
    // Keep barrel alive and burning the whole time
    BR.barrel.burnTimer = Math.min(BR.barrel.burnTimer + 1, 290);

    var allGone = true;
    for (var zi2 = 0; zi2 < BR.zombies.length; zi2++) {
      var z2 = BR.zombies[zi2];
      if (!z2.alive) continue;
      allGone = false;
      z2.zigT += 0.06;
      var dx2 = BR.barrel.x - z2.x, dy2 = BR.barrel.y - z2.y;
      var dist2 = Math.sqrt(dx2*dx2 + dy2*dy2) || 1;
      if (z2.entry === 'left' || z2.entry === 'right') {
        // Circular arc approach from side
        z2.circleT = (z2.circleT||0) + 0.04;
        z2.circleR = Math.min((z2.circleR||0)+2, 60);
        var arcX = Math.cos(z2.circleT) * z2.circleR;
        var arcY = Math.sin(z2.circleT) * z2.circleR;
        z2.x += (dx2/dist2)*1.6 + arcX*0.06;
        z2.y += (dy2/dist2)*1.6 + arcY*0.06;
      } else {
        var perpX2 = -dy2/dist2, perpY2 = dx2/dist2;
        var zigAmt2 = Math.sin(z2.zigT + z2.index * 1.2) * 22;
        z2.x += (dx2/dist2) * 1.8 + perpX2 * zigAmt2 * 0.08;
        z2.y += (dy2/dist2) * 1.8 + perpY2 * zigAmt2 * 0.08;
      }
      if (z2.y > BR.playerY - 30) z2.y = BR.playerY - 30;
      if (dist2 < 28) {
        z2.alive = false; BR.hits++;
        spawnParticles(z2.x, z2.y, '#ff4400', 8);
        addBrFloat(z2.x, z2.y - 10, 'BURNED!', '#ff6600', false);
        playTone(150, 'sawtooth', 0.12, 0.15);
      }
    }
    if (allGone) {
      BR.linesComplete++;
      BR.barrel = null; // extinguish old barrel
      if (BR.linesComplete >= BR.totalLines) {
        BR.done = true; BR.endTimer = 0;
        addBrFloat(W/2, H*0.4, 'ALL LINES BURNED!', '#ffd700', true);
      } else {
        // Immediately spawn new barrel for next line
        BR.phase = 'barrel';
        BR.zombies = [];
        brSpawnBarrel();
        addBrFloat(W/2, H*0.35, 'LINE ' + (BR.linesComplete+1) + ' OF 4 — NEW BARREL!', '#ffdd44', true);
      }
    }
  }

  BR.floats = BR.floats.filter(function(f) { f.y += f.vy; f.alpha -= 0.012; return f.alpha > 0; });
  if (gameState) {
    gameState.particles = gameState.particles.filter(function(p) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay; return p.life > 0;
    });
  }
}

function brDraw() {
  drawSky(bonusSkyTheme);
  for (var si = 0; si < 80; si++) {
    var sx = (si * 139 + (BR.frame||0) * 0.2) % W;
    var sy = (si * 97  + (BR.frame||0) * 0.35) % H;
    ctx.fillStyle = 'rgba(255,255,255,' + (0.15 + (si%5)*0.07) + ')';
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 14;
  ctx.font = 'bold 18px Arial Black';
  ctx.fillText('BARREL CONGA', W/2, 30); ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,200,100,0.75)'; ctx.font = 'bold 10px Arial';
  ctx.fillText('WAVE ' + BR.mainState.round + '  —  SHOOT BARREL, BURN THE LINE', W/2, 48);
  ctx.restore();
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 56, W, 22);
  ctx.save(); ctx.font = 'bold 10px Arial'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff'; ctx.textAlign = 'left';
  ctx.fillText('LINES: ' + BR.linesComplete + ' / ' + BR.totalLines, 12, 67);
  ctx.fillStyle = '#ffdd44'; ctx.textAlign = 'center';
  ctx.fillText('SHOTS: ' + BR.shots + '  HITS: ' + BR.hits, W/2, 67);
  ctx.restore();

  if (BR.barrel) {
    var brl = BR.barrel;
    ctx.save(); ctx.translate(brl.x, brl.y);
    if (brl.isCar && !brl.lit) {
      // Draw a sideways car as target
      ctx.fillStyle = '#334433'; ctx.strokeStyle = '#66aa66'; ctx.lineWidth = 2;
      ctx.beginPath(); rr(-28,-14,56,28,6); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(150,220,255,0.6)'; ctx.fillRect(-20,-11,14,9); ctx.fillRect(6,-11,14,9);
      var p2 = 0.6+0.4*Math.sin(BR.frame*0.08);
      ctx.fillStyle='rgba(255,200,0,'+p2+')'; ctx.font='bold 9px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('SHOOT!',0,-28);
      ctx.strokeStyle='rgba(255,200,0,'+(p2*0.6)+')'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(0,0,36,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    } else {
    var bw = 22, bh = 32;
    var bc = brl.lit ? '#5a2800' : '#3a4a3a';
    var sc = brl.lit ? '#ff6600' : '#778877';
    // Body — rectangle
    ctx.fillStyle = bc; ctx.strokeStyle = sc; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.rect(-bw, -bh/2, bw*2, bh); ctx.fill(); ctx.stroke();
    // Oval top lid
    ctx.fillStyle = brl.lit ? '#7a3800' : '#4a5a4a';
    ctx.strokeStyle = sc;
    ctx.beginPath(); ctx.ellipse(0, -bh/2, bw, 7, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // Oval bottom
    ctx.fillStyle = bc;
    ctx.beginPath(); ctx.ellipse(0, bh/2, bw, 7, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // Metal bands
    ctx.strokeStyle = brl.lit ? '#cc4400' : '#556655'; ctx.lineWidth = 3;
    [-8, 8].forEach(function(yb) {
      ctx.beginPath(); ctx.rect(-bw, yb-2, bw*2, 4); ctx.stroke();
    });
    if (brl.lit) {
      var ft = BR.frame * 0.15;
      ctx.fillStyle = 'rgba(255,120,0,0.9)';
      ctx.beginPath(); ctx.ellipse(0, -bh/2-14+Math.sin(ft)*4, 10+Math.sin(ft)*3, 14+Math.cos(ft)*3, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,230,0,0.8)';
      ctx.beginPath(); ctx.ellipse(0, -bh/2-20+Math.sin(ft*1.3)*3, 6, 10, 0, 0, Math.PI*2); ctx.fill();
    } else {
      var pulse = 0.6 + 0.4 * Math.sin(BR.frame * 0.08);
      ctx.fillStyle = 'rgba(255,200,0,' + pulse + ')';
      ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('SHOOT!', 0, -bh/2 - 18);
      ctx.strokeStyle = 'rgba(255,200,0,' + pulse*0.6 + ')'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
    } // end else (not isCar)
  } // end if BR.barrel

  for (var zi3 = 0; zi3 < BR.zombies.length; zi3++) {
    var z3 = BR.zombies[zi3];
    if (!z3.alive) continue;
    drawZombie(z3.x, z3.y, 0.75, 1, 1, 'normal', false);
    if (zi3 < BR.zombies.length - 1 && BR.zombies[zi3+1].alive) {
      var nz = BR.zombies[zi3+1];
      ctx.save(); ctx.strokeStyle = 'rgba(255,100,0,0.35)'; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.moveTo(z3.x, z3.y); ctx.lineTo(nz.x, nz.y); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    }
  }

  ctx.fillStyle = '#ffee44';
  BR.bullets.forEach(function(b) { ctx.fillRect(b.x-2, b.y-10, 4, 20); });
  if (gameState) gameState.particles.forEach(drawParticle);
  ctx.fillStyle = '#1a2a1a'; ctx.fillRect(0, BR.playerY+28, W, 4);
  drawSoldier(BR.playerX, BR.playerY, 1.1);

  BR.floats.forEach(function(f) {
    ctx.save(); ctx.globalAlpha = f.alpha;
    ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 8;
    ctx.font = (f.big ? 'bold 16px' : 'bold 12px') + ' Arial Black';
    ctx.textAlign = 'center'; ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  });

  var jx = W*0.20, jy = H-65;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(jx, jy, 44, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('<', jx-30, jy); ctx.fillText('>', jx+30, jy);
  ctx.fillStyle = BR.joyActive ? 'rgba(255,200,0,0.85)' : 'rgba(255,200,0,0.4)';
  ctx.shadowColor = 'rgba(255,200,0,0.5)'; ctx.shadowBlur = BR.joyActive ? 12 : 4;
  ctx.beginPath(); ctx.arc(jx + BR.joyDx * 26, jy, 20, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  var fbx = W*0.80, fby = H-65;
  var canFire = BR.bullets.length < 2;
  ctx.save();
  ctx.fillStyle = canFire ? 'rgba(220,40,40,0.88)' : 'rgba(80,20,20,0.7)';
  ctx.strokeStyle = canFire ? '#ff2222' : '#552222'; ctx.lineWidth = 3;
  ctx.shadowColor = '#ff2222'; ctx.shadowBlur = canFire ? 18 : 4;
  ctx.beginPath(); ctx.arc(fbx, fby, 38, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0; ctx.fillStyle = canFire ? '#fff' : 'rgba(255,255,255,0.35)';
  ctx.font = 'bold 14px Arial Black'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(canFire ? 'FIRE' : 'WAIT', fbx, fby);
  ctx.restore();

  if (BR.done) {
    var fi = Math.min(1, BR.endTimer / 40);
    ctx.fillStyle = 'rgba(0,0,0,' + fi*0.8 + ')'; ctx.fillRect(0,0,W,H);
    if (fi > 0.5) {
      var acc = BR.shots > 0 ? Math.round(BR.hits/BR.shots*100) : 100;
      var scoreB = BR.hits * 400, soldB = Math.floor(BR.hits / 3);
      ctx.save(); ctx.textAlign = 'center';
      ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
      ctx.font = 'bold 22px Arial Black';
      ctx.fillText('CONGA COMPLETE!', W/2, H*0.25); ctx.shadowBlur = 0;
      ctx.font = 'bold 13px Arial'; ctx.fillStyle = '#fff';
      ctx.fillText('SHOTS: ' + BR.shots, W/2, H*0.37);
      ctx.fillText('HITS: ' + BR.hits, W/2, H*0.45);
      ctx.fillStyle = acc >= 80 ? '#44ff88' : acc >= 50 ? '#ffdd44' : '#ff6666';
      ctx.font = 'bold 17px Arial Black';
      ctx.fillText('ACCURACY: ' + acc + '%', W/2, H*0.54);
      ctx.fillStyle = '#ffe044'; ctx.font = 'bold 13px Arial';
      ctx.fillText('+' + scoreB.toLocaleString() + ' SCORE', W/2, H*0.63);
      ctx.fillStyle = '#44ff88';
      ctx.fillText('+' + soldB + ' SOLDIERS', W/2, H*0.71);
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '10px Arial';
      ctx.fillText('NEXT WAVE STARTING...', W/2, H*0.81);
      ctx.restore();
    }
  }
}

var bonusRoundsPlayed = 0;
var pendingRewardPrev = null;
var rewardChoices = [];
var showingRewardChoice = false;
var REWARD_TYPES = ['tank','turret','exoskeleton'];

function brFinish() {
  canvas.removeEventListener('touchstart', brOnTouchStart);
  canvas.removeEventListener('touchmove',  brOnTouchMove);
  canvas.removeEventListener('touchend',   brOnTouchEnd);
  canvas.removeEventListener('mousedown',  brOnMouseDown);
  canvas.removeEventListener('mousemove',  brOnMouseMove);
  canvas.removeEventListener('mouseup',    brOnMouseUp);
  var scoreBonus = BR.hits * 400;
  var soldierBonus = Math.floor(BR.hits / 3);
  var prev = BR.mainState;
  // totalElapsed already on prev — bonus round time not counted
  prev.score += scoreBonus;
  prev.soldiers = Math.min(200, prev.soldiers + soldierBonus);
  bonusRoundsPlayed++;
  BR = null;
  waveTrans = false;
  if (bonusRoundsPlayed >= 2) {
    // Show reward choice screen
    pendingRewardPrev = prev;
    var pool = REWARD_TYPES.slice();
    // Shuffle and pick 2
    pool.sort(function(){return Math.random()-0.5;});
    rewardChoices = [pool[0], pool[1]];
    showingRewardChoice = true;
    gameMode = 'rewardChoice';
  } else {
    document.getElementById('cogBtn').style.display = 'flex';
    startGame(prev);
  }
}

function chooseReward(type) {
  showingRewardChoice = false;
  var prev = pendingRewardPrev;
  pendingRewardPrev = null;
  // Can stack at round 5+
  var canStack = prev.round >= 5;
  if (!canStack) {
    prev.tank = null; prev.turret = null; prev.exoskeleton = null;
  }
  if (type === 'tank') {
    prev.tank = { x: W/2, y: H*0.5, targetX: W/2, targetY: H*0.5, angle: 0, hp: 100*prev.round, maxHp: 100*prev.round, speed: 1.5, fireTimer: 0 };
  } else if (type === 'turret') {
    prev.turret = { x: W/2, y: H*0.75, hp: 200, maxHp: 200, fireTimer: 0, placing: true };
  } else if (type === 'exoskeleton') {
    prev.exoskeleton = { x: W/2, y: H*0.6, hp: 1000, maxHp: 1000, fireTimer: 0, alive: true };
  }
  document.getElementById('cogBtn').style.display = 'flex';
  startGame(prev);
}

/* =========================================================
   MAIN LOOP
========================================================= */
function loop() {
  if (gameMode === 'bonus') {
    if (BR) brTick_inner();
  } else if (gameMode === 'rewardChoice') {
    drawRewardChoice();
  } else if (gameMode === 'victory') {
    // Just show the overlay, no update
  } else {
    if (gameState && !gameState.gameOver) update();
    if (gameMode !== 'title') draw();
  }
  requestAnimationFrame(loop);
}

function drawRewardChoice() {
  drawSky(bonusSkyTheme);
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 16;
  ctx.font = 'bold 20px Arial Black';
  ctx.fillText('BONUS REWARD!', W/2, H*0.12); ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,200,100,0.7)'; ctx.font = '11px Arial';
  ctx.fillText('CHOOSE YOUR SPECIAL WEAPON', W/2, H*0.20);
  ctx.restore();
  var icons = { tank:'🪖', turret:'🔫', exoskeleton:'🤖' };
  var descs = {
    tank: ['TANK', 'Tap to direct.', 'Crushes zombies.'],
    turret: ['TURRET', 'Place before round.', 'Auto-fires forever.'],
    exoskeleton: ['EXOSKELETON', 'Walks up, attacks', 'farthest zombie. 1000HP.']
  };
  rewardChoices.forEach(function(type, idx) {
    var cx = W * (idx === 0 ? 0.28 : 0.72), cy = H * 0.50;
    var cw = Math.min(W*0.36, 150), ch = 160;
    ctx.save();
    ctx.fillStyle = 'rgba(10,5,30,0.92)';
    ctx.strokeStyle = 'rgba(255,200,0,0.6)'; ctx.lineWidth = 2;
    ctx.beginPath(); rr(cx-cw/2, cy-ch/2, cw, ch, 12); ctx.fill(); ctx.stroke();
    ctx.textAlign = 'center';
    ctx.font = '36px Arial'; ctx.fillText(icons[type], cx, cy - ch*0.22);
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 13px Arial Black';
    ctx.fillText(descs[type][0], cx, cy + 4);
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '10px Arial';
    ctx.fillText(descs[type][1], cx, cy + 22);
    ctx.fillText(descs[type][2], cx, cy + 36);
    // Tap hint
    ctx.fillStyle = 'rgba(255,220,0,0.55)'; ctx.font = 'bold 9px Arial';
    ctx.fillText('TAP TO CHOOSE', cx, cy + ch*0.43);
    ctx.restore();
  });
}

/* =========================================================
   START GAME
========================================================= */
function startGame(prev) {
  gameState = makeState(prev || null);
  dragX = W / 2;
  gameMode = 'playing';
  waveTrans = false;
  currentSkyTheme = pickSkyTheme();
  sfxStopAllHorns();
  document.getElementById('cogBtn').style.display = 'flex';
  document.getElementById('airBtn').style.display = 'block';
  updateAirBtn();
}

/* =========================================================
   TOUCH / MOUSE INPUT
========================================================= */
canvas.addEventListener('touchstart', function(e) {
  if (BR) return;
  if (gameMode === 'rewardChoice') {
    e.preventDefault();
    var tx = e.touches[0].clientX, ty = e.touches[0].clientY;
    rewardChoices.forEach(function(type, idx) {
      var cx = W * (idx === 0 ? 0.28 : 0.72);
      var cy = H * 0.50;
      var cw = Math.min(W*0.36, 150), ch = 160;
      if (tx > cx-cw/2 && tx < cx+cw/2 && ty > cy-ch/2 && ty < cy+ch/2) {
        chooseReward(type);
      }
    });
    return;
  }
  if (!gameState || !gameState.running) return;
  e.preventDefault();
  var tx = e.touches[0].clientX, ty = e.touches[0].clientY;
  // Turret placement
  if (gameState.turret && gameState.turret.placing) {
    gameState.turret.x = tx;
    gameState.turret.y = Math.min(ty, H * 0.75);
    return;
  }
  // Tap to place turret if touching it
  if (gameState.turret && gameState.turret.placing) {
    gameState.turret.placing = false; return;
  }
  var tapped = false;
  gameState.copCars.forEach(function(cc) {
    if (!cc.active || cc.launched) return;
    if (Math.abs(tx - cc.x) < 50 && Math.abs(ty - cc.y) < 40) {
      launchCopCar(cc); tapped = true;
    }
  });
  // Tank direction
  if (!tapped && gameState.tank && gameState.tank.hp > 0) {
    gameState.tank.targetX = tx; gameState.tank.targetY = ty; tapped = true;
  }
  if (!tapped) dragX = tx;
  else dragX = null;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  if (BR) return;
  if (!gameState || !gameState.running) return;
  e.preventDefault();
  var x = e.touches[0].clientX;
  if (dragX !== null) gameState.squadX += (x - dragX) * 1.0;
  gameState.squadX = Math.max(0, Math.min(W, gameState.squadX));
  dragX = x;
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  if (BR) return;
  if (!gameState || !gameState.running) return;
  if (gameState.turret && gameState.turret.placing) {
    gameState.turret.placing = false; return;
  }
  dragX = null;
}, { passive: true });

canvas.addEventListener('click', function(e) {
  if (gameMode === 'rewardChoice') {
    rewardChoices.forEach(function(type, idx) {
      var cx = W * (idx === 0 ? 0.28 : 0.72);
      var cy = H * 0.50;
      var cw = Math.min(W*0.36, 150), ch = 160;
      if (e.clientX > cx-cw/2 && e.clientX < cx+cw/2 && e.clientY > cy-ch/2 && e.clientY < cy+ch/2) {
        chooseReward(type);
      }
    });
  }
});

canvas.addEventListener('mousemove', function(e) {
  if (!gameState || !gameState.running) return;
  gameState.squadX = e.clientX;
});

</script>

<!-- YouTube IFrame API callback — must be global -->

<script>
var ytReady = false;
var ytPendingPlay = false;

function onYouTubeIframeAPIReady() {
  ytReady = true;
  var url = document.getElementById('ytInput').value.trim() || 'https://youtu.be/XMcbjp4Sq4M';
  var info = ytExtract(url);
  if (!info) return;
  var pvars = { autoplay: 1, playsinline: 1, controls: 0, mute: 1, origin: window.location.origin };
  var vidId;
  if (info.type === 'playlist') { pvars.listType = 'playlist'; pvars.list = info.id; pvars.shuffle = 1; }
  else { vidId = info.id; pvars.loop = 1; pvars.playlist = info.id; }
  var cfg = {
    height: '200', width: '200', playerVars: pvars,
    events: {
      onReady: function(e) {
        e.target.setVolume(Math.round(musicVolume * 100));
        if (ytPendingPlay) {
          e.target.unMute(); e.target.playVideo();
          ytPendingPlay = false;
          document.getElementById('musicStatus').textContent = 'Playing';
        }
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED || e.data === YT.PlayerState.UNSTARTED) e.target.playVideo();
      }
    }
  };
  if (vidId) cfg.videoId = vidId;
  ytPlayer = new YT.Player('ytPlayerContainer', cfg);
}
</script>
