<head>

<script src="https://www.youtube.com/iframe_api"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;overflow:hidden;}
body{background:#000;overflow:hidden;font-family:'Arial Black',Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;height:100%;height:100dvh;position:fixed;width:100%;-webkit-overflow-scrolling:none;}
#gameCanvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;touch-action:none;}

/* Audio modal */
#audioPermModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
#audioPermCard{background:rgba(10,5,20,0.99);border:2px solid rgba(255,107,53,0.6);border-radius:16px;padding:28px 26px;max-width:340px;width:100%;text-align:center;}

#enableAudioBtn{background:rgba(255,107,53,0.15);border:2px solid rgba(255,107,53,0.8);border-radius:8px;color:#ff6b35;font-family:‘Arial Black’,Arial,sans-serif;font-size:12px;letter-spacing:2px;padding:14px 20px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
#enableAudioBtn:active{background:rgba(255,107,53,0.3);}
#skipAudioBtn{background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:rgba(255,255,255,0.35);font-family:‘Arial Black’,Arial,sans-serif;font-size:9px;letter-spacing:2px;padding:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

/* Game over overlay */
#gameOverScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:50;display:none;align-items:center;justify-content:center;padding:20px;}
#gameOverCard{background:rgba(10,5,20,0.99);border:2px solid #ff4444;border-radius:14px;padding:24px;max-width:360px;width:100%;text-align:center;color:#fff;}

/* Cog button */
#cogBtn{position:fixed;bottom:18px;left:18px;z-index:30;pointer-events:auto;background:rgba(10,5,20,0.85);border:1px solid rgba(255,107,53,0.5);border-radius:50%;width:44px;height:44px;font-size:20px;color:rgba(255,107,53,0.85);cursor:pointer;display:none;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

/* Cog menu */
#cogMenuOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:80;display:none;align-items:center;justify-content:center;padding:16px;}
#cogMenuOverlay.show{display:flex;}
#cogCard{background:rgba(10,5,20,0.99);border:2px solid rgba(255,107,53,0.4);border-radius:14px;padding:22px 24px;max-width:340px;width:100%;position:relative;color:#fff;}
#cogCard h2{font-size:11px;letter-spacing:4px;color:#ff6b35;margin-bottom:18px;text-align:center;}
#closeCog{position:absolute;top:13px;right:15px;background:transparent;border:none;color:rgba(255,107,53,0.7);font-size:20px;cursor:pointer;line-height:1;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.cogSection label{font-size:8px;letter-spacing:2px;color:rgba(255,107,53,0.7);display:block;margin-bottom:6px;}
#ytInput{width:100%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,107,53,0.3);border-radius:5px;color:#ff8c5a;font-size:9px;padding:7px 9px;font-family:‘Arial Black’,Arial,sans-serif;outline:none;margin-bottom:7px;}
.cogRow{display:flex;gap:7px;margin-bottom:7px;}
.cogMusicBtn{flex:1;background:transparent;border:1px solid rgba(255,107,53,0.35);border-radius:5px;color:rgba(255,107,53,0.85);font-size:9px;letter-spacing:1px;padding:8px 4px;cursor:pointer;font-family:‘Arial Black’,Arial,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}

.volRow{display:flex;align-items:center;gap:10px;margin-bottom:8px;}

/* Airstrike button */
#airBtn{position:fixed;bottom:18px;right:18px;z-index:30;background:rgba(10,5,20,0.88);border:2px solid #ff4400;border-radius:12px;color:#fff;font-family:‘Arial Black’,Arial,sans-serif;font-size:0.7em;padding:10px 12px;text-align:center;pointer-events:auto;touch-action:manipulation;cursor:pointer;display:none;min-width:64px;-webkit-tap-highlight-color:transparent;}
#airBtn.ready{border-color:#ff4400;box-shadow:0 0 12px rgba(255,68,0,0.6);}
#airBtn.locked{border-color:#555;color:#888;}

#ytPlayerContainer{position:fixed;left:-220px;bottom:0;width:200px;height:200px;pointer-events:none;}
</style>

</head>
<body>

<canvas id="gameCanvas"></canvas>

</div>

<!-- Airstrike button -->

<!-- Hidden YouTube player -->

<div id="ytPlayerContainer"></div>

<script>
'use strict';

/* =========================================================
   CANVAS + RESIZE
========================================================= */
var canvas = document.getElementById('gameCanvas');
var ctx = canvas.getContext('2d');
var W = 0, H = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (gameState && gameState.running) {
    gameState.squadX = W / 2;
  }
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function() { setTimeout(resize, 120); });
resize();

/* =========================================================
   AUDIO
========================================================= */
var audioCtx = null;
var audioUnlocked = false;
var sfxVolume = 0.6;

function unlockAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  audioUnlocked = true;
}

function playTone(freq, type, vol, dur, delay) {
  if (!audioUnlocked || !audioCtx) return;
  try {
    var o = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type || 'square';
    o.frequency.value = freq;
    var t = audioCtx.currentTime + (delay || 0);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol * sfxVolume, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.01);
  } catch(e) {}
}

function sfxShoot() { playTone(880, 'square', 0.12, 0.04); }
function sfxZombieDie() { playTone(110, 'sawtooth', 0.18, 0.12); }
function sfxPickup() { playTone(660, 'sine', 0.15, 0.1); playTone(880, 'sine', 0.15, 0.1, 0.08); }
function sfxAirstrike() { playTone(55, 'sawtooth', 0.3, 0.5); playTone(80, 'sawtooth', 0.25, 0.4, 0.1); }
function sfxLaser() { playTone(1200, 'sine', 0.1, 0.05); }

/* =========================================================
   YOUTUBE MUSIC
========================================================= */
var ytPlayer = null;
var ytPendingPlay = false;
var musicVolume = 0.6;
var DEFAULT_YT = 'https://youtu.be/XMcbjp4Sq4M';

function ytExtract(url) {
  try {
    var pl = url.match(/[?&]list=([A-Za-z0-9_-]+)/);
    if (pl) return { type: 'playlist', id: pl[1] };
    var v = url.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
    if (v) return { type: 'video', id: v[1] };
  } catch(e) {}
  return null;
}

function ytStartMusic() {
  if (ytPlayer && ytPlayer.unMute) {
    ytPlayer.unMute();
    ytPlayer.setVolume(Math.round(musicVolume * 100));
    ytPlayer.playVideo();
    document.getElementById('musicStatus').textContent = 'Playing';
  } else {
    ytPendingPlay = true;
  }
}

document.getElementById('cogBtn').addEventListener('click', function() {
  document.getElementById('cogMenuOverlay').classList.add('show');
});
document.getElementById('closeCog').addEventListener('click', function() {
  document.getElementById('cogMenuOverlay').classList.remove('show');
});
document.getElementById('cogMenuOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
});
document.getElementById('ytPlay').addEventListener('click', function() {
  var url = document.getElementById('ytInput').value.trim() || DEFAULT_YT;
  if (ytPlayer && ytPlayer.unMute) {
    var info = ytExtract(url);
    if (!info) { document.getElementById('musicStatus').textContent = 'Invalid URL'; return; }
    if (info.type === 'playlist') { ytPlayer.loadPlaylist({ list: info.id, listType: 'playlist', index: 0 }); }
    else { ytPlayer.loadVideoById(info.id); }
    ytPlayer.unMute(); ytPlayer.setVolume(Math.round(musicVolume * 100)); ytPlayer.playVideo();
    document.getElementById('musicStatus').textContent = 'Playing';
  } else { ytPendingPlay = true; }
});
document.getElementById('ytStop').addEventListener('click', function() {
  if (ytPlayer && ytPlayer.pauseVideo) { ytPlayer.pauseVideo(); ytPlayer.mute(); }
  document.getElementById('musicStatus').textContent = 'Stopped';
});
document.getElementById('musicVol').addEventListener('input', function() {
  musicVolume = this.value / 100;
  if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(Math.round(musicVolume * 100));
});
document.getElementById('sfxVol').addEventListener('input', function() { sfxVolume = this.value / 100; });

/* =========================================================
   TITLE SCREEN — canvas drawn, events on canvas (proven pattern)
========================================================= */
(function() {
  var tc = canvas; // reuse the game canvas for the title
  var stars = [], shine = 0, raf, titleDone = false, blinkOn = true, blinkCount = 0;
  for (var i = 0; i < 220; i++) {
    stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + 0.3,
      a: Math.random() * 0.5 + 0.4, tw: Math.random() * Math.PI * 2, ts: Math.random() * 0.003 + 0.0005 });
  }

  function drawTitleFrame() {
    var w = tc.width, h = tc.height;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    // Stars
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i]; s.tw += s.ts;
      ctx.beginPath(); ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,100,40,' + (s.a * (0.5 + 0.5 * Math.sin(s.tw))) + ')';
      ctx.fill();
    }
    // ZOMBIE HORDE text
    ctx.save(); ctx.translate(w / 2, h * 0.38);
    var fs = Math.min(w * 0.17, h * 0.13, 76);
    var lineGap = fs * 1.18;
    var lines = ['ZOMBIE', 'HORDE'];
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (var li = 0; li < lines.length; li++) {
      var ly = (li - (lines.length - 1) / 2) * lineGap;
      ctx.font = '900 ' + fs + 'px Arial Black,Arial,sans-serif';
      ctx.shadowColor = 'rgba(255,40,0,0.95)'; ctx.shadowBlur = 28;
      ctx.fillStyle = 'rgba(160,15,0,0.3)'; ctx.fillText(lines[li], 4, ly + 4);
      ctx.shadowColor = 'rgba(255,140,0,0.8)'; ctx.shadowBlur = 36;
      var grd = ctx.createLinearGradient(-w * 0.3, -fs * 0.5, w * 0.3, fs * 0.5);
      grd.addColorStop(0, '#ff2200'); grd.addColorStop(0.4, '#ffaa00');
      grd.addColorStop(0.7, '#ff4400'); grd.addColorStop(1, '#ff2200');
      ctx.fillStyle = grd; ctx.fillText(lines[li], 0, ly);
      shine = (shine + 0.002) % 1;
      var sw = w * 0.45;
      var sg = ctx.createLinearGradient(-sw + shine * sw * 2.5, ly - fs, -sw + shine * sw * 2.5 + sw * 0.4, ly + fs);
      sg.addColorStop(0, 'rgba(255,255,255,0)'); sg.addColorStop(0.5, 'rgba(255,255,255,0.38)'); sg.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sg; ctx.shadowBlur = 0; ctx.fillText(lines[li], 0, ly);
    }
    ctx.restore();
    // Subtitle
    var subY = h * 0.38 + lineGap * 1.4;
    var subFs = Math.min(w * 0.028, 13);
    ctx.save(); ctx.font = 'bold ' + subFs + 'px Arial Black,Arial,sans-serif';
    ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,160,80,0.8)';
    ctx.shadowColor = 'rgba(255,80,0,0.5)'; ctx.shadowBlur = 10;
    ctx.fillText('SURVIVE THE HORDE. KILL THE KING.', w / 2, subY); ctx.restore();
    // TAP TO BEGIN blink
    blinkCount++;
    if (blinkCount % 48 === 0) blinkOn = !blinkOn;
    if (blinkOn) {
      var hintFs = Math.min(w * 0.036, 14);
      ctx.save(); ctx.font = 'bold ' + hintFs + 'px Arial Black,Arial,sans-serif';
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,210,0,0.92)';
      ctx.shadowColor = 'rgba(255,200,0,0.7)'; ctx.shadowBlur = 10;
      ctx.fillText('TAP TO BEGIN', w / 2, h * 0.82); ctx.restore();
    }
    raf = requestAnimationFrame(drawTitleFrame);
  }

  drawTitleFrame();

  function proceed() {
    if (titleDone) return; titleDone = true;
    cancelAnimationFrame(raf);
    // Fade out by drawing black overlay over several frames
    var alpha = 0;
    function fadeOut() {
      alpha += 0.05;
      ctx.fillStyle = 'rgba(0,0,0,' + Math.min(alpha, 1) + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (alpha < 1) { requestAnimationFrame(fadeOut); }
      else { document.getElementById('audioPermModal').style.display = 'flex'; }
    }
    fadeOut();
  }

  canvas.addEventListener('click', proceed);
  canvas.addEventListener('touchend', function(e) { e.preventDefault(); proceed(); }, { passive: false });
})();

/* =========================================================
   AUDIO PERMISSION MODAL
========================================================= */
document.getElementById('enableAudioBtn').addEventListener('click', function() {
  unlockAudio();
  ytStartMusic();
  document.getElementById('audioPermModal').style.display = 'none';
  startGame();
});
document.getElementById('skipAudioBtn').addEventListener('click', function() {
  document.getElementById('audioPermModal').style.display = 'none';
  startGame();
});
document.getElementById('retryBtn').addEventListener('click', function() {
  document.getElementById('gameOverScreen').style.display = 'none';
  startGame();
});

/* =========================================================
   WEAPONS
========================================================= */
var WEAPONS = {
  bullet:       { name: 'Rifle',        color: '#ffe044', glow: '#ffcc00', attack: 1,  dur: 0,   rate: 8,  range: 99999, spread: true,  continuous: false },
  flamethrower: { name: 'Flamethrower', color: '#ff6600', glow: '#ff3300', attack: 5,  dur: 600, rate: 3,  range: 160,   spread: true,  continuous: false },
  laser:        { name: 'Laser',        color: '#00ffff', glow: '#00aaaa', attack: 20, dur: 600, rate: 1,  range: 99999, spread: false, continuous: true  },
  machinegun:   { name: 'Machine Gun',  color: '#ff44bb', glow: '#cc0088', attack: 10, dur: 600, rate: 2,  range: 99999, spread: true,  continuous: false }
};

/* =========================================================
   GAME STATE
========================================================= */
var gameState = null;
var animFrame = null;
var dragX = null;

function makeState(prev) {
  var round     = prev ? prev.round + 1 : 1;
  var score     = prev ? prev.score : 0;
  var kills     = prev ? prev.kills : 0;
  var bossKills = prev ? prev.bossKills : 0;
  var soldiers  = prev ? prev.soldiers : 1;
  var airstrikes= prev ? prev.airstrikes : 0;
  return {
    running: true,
    round: round,
    score: score,
    kills: kills,
    bossKills: bossKills,
    soldiers: soldiers,
    zombieHpMult: Math.pow(2, round - 1),
    squadX: W / 2,
    elapsed: 0,
    frame: 0,
    fireTimer: 0,
    currentWeapon: 'bullet',
    weaponTimer: 0,
    airstrikes: airstrikes,
    airstrikeThreshold: Math.floor(score / 20000) * 20000 + 20000,
    bullets: [],
    zombies: [],
    bosses: [],
    soldierPickups: [],
    weaponPickups: [],
    lightningPickups: [],
    cars: [],
    bombs: [],
    airPlane: null,
    lightningStrikes: [],
    particles: [],
    floats: [],
    lastZombieTime: Date.now(),
    lastSoldierTime: Date.now(),
    lastWeaponTime: Date.now() - 14000,
    lastLightningTime: Date.now() - 20000,
    lastCarTime: Date.now() - 10000,
    lastBossTime: Date.now(),
    reinforcementsAt60: false,
    kingSpawned: false,
    kingDefeated: false,
    roundClearTimer: 0,
    gameOver: false
  };
}

/* =========================================================
   DRAW HELPERS
========================================================= */
function rr(x, y, w, h, r) {
  r = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawZombie(x, y, scale, hp, maxHp, type) {
  ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
  var bc = type === 'boss' ? '#8B0000' : type === 'special' ? '#6a0dad' : '#2d5a27';
  var hc = type === 'boss' ? '#b22222' : type === 'special' ? '#9b30d0' : '#5a9952';
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(0, 23, 12, 4, 0, 0, Math.PI * 2); ctx.fill();
  // Body
  ctx.fillStyle = bc; ctx.beginPath(); rr(-9, 0, 18, 22, 4); ctx.fill();
  // Head
  ctx.fillStyle = hc; ctx.beginPath(); ctx.ellipse(0, -8, 11, 12, 0, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#ff0';
  ctx.beginPath(); ctx.ellipse(-4, -10, 3, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, -10, 3, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f00';
  ctx.beginPath(); ctx.ellipse(-4, -10, 1.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4, -10, 1.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  // Mouth
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, -4, 5, 0.2, Math.PI - 0.2); ctx.stroke();
  ctx.fillStyle = '#eee'; ctx.fillRect(-4, -5, 3, 3); ctx.fillRect(1, -5, 3, 3);
  // Arms
  ctx.fillStyle = hc; ctx.fillRect(-16, 2, 7, 5); ctx.fillRect(9, 2, 7, 5);
  // Legs
  ctx.fillStyle = bc; ctx.fillRect(-8, 20, 6, 8); ctx.fillRect(2, 20, 6, 8);
  // Crown for boss
  if (type === 'boss') {
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(-10, -18); ctx.lineTo(-10, -25); ctx.lineTo(-5, -20);
    ctx.lineTo(0, -27); ctx.lineTo(5, -20); ctx.lineTo(10, -25); ctx.lineTo(10, -18);
    ctx.closePath(); ctx.fill();
  }
  // HP bar
  if (maxHp > 1) {
    var bW = 28, bf = (hp / maxHp) * bW;
    ctx.fillStyle = '#333'; ctx.fillRect(-bW / 2, -32, bW, 5);
    ctx.fillStyle = hp / maxHp > 0.5 ? '#44ff44' : hp / maxHp > 0.25 ? '#ffaa00' : '#ff2222';
    ctx.fillRect(-bW / 2, -32, bf, 5);
  }
  ctx.restore();
}

function drawSoldier(x, y, scale) {
  ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
  var st = gameState;
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, 20, 8, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#5c7a3e'; ctx.beginPath(); rr(-7, 0, 14, 18, 3); ctx.fill();
  ctx.fillStyle = '#f4c68a'; ctx.beginPath(); ctx.ellipse(0, -7, 8, 9, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#3d5228';
  ctx.beginPath(); ctx.ellipse(0, -12, 9, 6, 0, Math.PI, Math.PI * 2); ctx.fill();
  ctx.fillRect(-9, -12, 18, 4);
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(-3, -7, 1.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(3, -7, 1.5, 1.5, 0, 0, Math.PI * 2); ctx.fill();
  var wc = WEAPONS[st ? st.currentWeapon : 'bullet'];
  ctx.fillStyle = (st && st.currentWeapon !== 'bullet') ? wc.color : '#333';
  if (st && st.currentWeapon !== 'bullet') { ctx.shadowColor = wc.glow; ctx.shadowBlur = 6; }
  ctx.fillRect(6, -2, 10, 3);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawPickup(x, y, label, color) {
  ctx.save();
  ctx.shadowColor = color; ctx.shadowBlur = 14;
  ctx.fillStyle = color; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); rr(x - 16, y - 14, 32, 28, 6); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
  ctx.restore();
}

function drawCar(car) {
  ctx.save(); ctx.translate(car.x, car.y);
  var clr = car.type === 'police' ? '#002299' : car.type === 'ambulance' ? '#ffffff' : '#884422';
  ctx.fillStyle = clr;
  ctx.beginPath(); rr(-22, -12, 44, 24, 5); ctx.fill();
  ctx.fillStyle = 'rgba(150,220,255,0.7)';
  ctx.fillRect(-16, -10, 12, 8); ctx.fillRect(4, -10, 12, 8);
  if (car.type === 'police') {
    ctx.fillStyle = '#ff4444'; ctx.fillRect(-6, -14, 5, 5);
    ctx.fillStyle = '#4444ff'; ctx.fillRect(1, -14, 5, 5);
  }
  // HP bar
  var bW = 40, bf = (car.hp / car.maxHp) * bW;
  ctx.fillStyle = '#333'; ctx.fillRect(-20, 16, bW, 4);
  ctx.fillStyle = '#ff8800'; ctx.fillRect(-20, 16, Math.max(0, bf), 4);
  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.life;
  ctx.fillStyle = p.color;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  var wc = WEAPONS[b.weapon || 'bullet'];
  ctx.fillStyle = wc.color; ctx.shadowColor = wc.glow; ctx.shadowBlur = 8;
  if (b.weapon === 'flamethrower') {
    ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    ctx.beginPath(); ctx.arc(b.x, b.y, 5 + Math.random() * 3, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillRect(b.x - 2, b.y - 5, 4, 10);
  }
  ctx.restore();
}

function drawAirplane(p) {
  ctx.save(); ctx.translate(p.x, p.y);
  ctx.fillStyle = '#aaa'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -20); ctx.lineTo(-8, 10); ctx.lineTo(0, 5); ctx.lineTo(8, 10); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawBomb(b) {
  ctx.save(); ctx.translate(b.x, b.y);
  ctx.fillStyle = '#ff6600'; ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawHUD() {
  var fs = Math.max(10, Math.min(13, W / 70));
  var pad = 8, barH = 58;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath(); rr(pad, pad, W - pad * 2, barH, 7); ctx.fill();

  ctx.font = 'bold ' + fs + 'px Arial';
  // Soldiers
  ctx.fillStyle = '#44ff88'; ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 4;
  ctx.textAlign = 'left'; ctx.fillText('[S] ' + gameState.soldiers, pad + 10, pad + 20); ctx.shadowBlur = 0;
  // Score
  ctx.fillStyle = '#ffe044'; ctx.shadowColor = '#ffe044'; ctx.shadowBlur = 4;
  ctx.textAlign = 'center'; ctx.fillText('* ' + gameState.score.toLocaleString(), W / 2, pad + 20); ctx.shadowBlur = 0;
  // Timer
  ctx.fillStyle = '#aaddff'; ctx.textAlign = 'right';
  var m = Math.floor(gameState.elapsed / 60), s = Math.floor(gameState.elapsed % 60).toString().padStart(2, '0');
  ctx.fillText(m + ':' + s, W - pad - 10, pad + 20);

  var fs2 = Math.max(9, Math.min(11, W / 82));
  ctx.font = 'bold ' + fs2 + 'px Arial';
  // Round
  ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 3;
  ctx.textAlign = 'left'; ctx.fillText('R' + gameState.round + ' x' + gameState.zombieHpMult + 'HP', pad + 10, pad + 46); ctx.shadowBlur = 0;
  // Weapon / center info
  if (gameState.currentWeapon !== 'bullet' && gameState.weaponTimer > 0) {
    var wc = WEAPONS[gameState.currentWeapon];
    ctx.fillStyle = wc.color; ctx.shadowColor = wc.glow; ctx.shadowBlur = 6;
    ctx.textAlign = 'center'; ctx.fillText(wc.name.toUpperCase() + ' ' + Math.ceil(gameState.weaponTimer / 60) + 's', W / 2, pad + 46);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = '#cc88ff'; ctx.textAlign = 'center';
    ctx.fillText(gameState.kills + ' kills | B:' + gameState.bossKills, W / 2, pad + 46);
  }
  // Boss timer
  var tSince = (Date.now() - gameState.lastBossTime) / 1000;
  var nb = Math.max(0, 60 - tSince);
  ctx.fillStyle = nb < 10 ? '#ff4444' : '#ffaa44'; ctx.textAlign = 'right';
  ctx.fillText((gameState.kingSpawned ? 'BOSS' : 'KING') + ' ' + Math.ceil(nb) + 's', W - pad - 10, pad + 46);
}

/* =========================================================
   SPAWN HELPERS
========================================================= */
function spawnZombie() {
  var st = gameState;
  var x = Math.random() * W;
  var special = Math.random() < 0.15;
  var hp = Math.round((special ? 3 : 1) * st.zombieHpMult);
  st.zombies.push({ x: x, y: -30, hp: hp, maxHp: hp, speed: 1.2 + Math.random() * 0.8 + (st.round - 1) * 0.15, type: special ? 'special' : 'normal' });
}

function spawnBoss() {
  var st = gameState;
  var hp = Math.round(40 * st.zombieHpMult);
  st.bosses.push({ x: W / 2 + (Math.random() - 0.5) * W * 0.4, y: -60, hp: hp, maxHp: hp, speed: 0.7 + (st.round - 1) * 0.1, type: 'boss' });
  st.kingSpawned = true;
}

function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var a = Math.random() * Math.PI * 2;
    var spd = 1 + Math.random() * 3;
    gameState.particles.push({ x: x, y: y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 2 + Math.random() * 3, color: color, life: 1, decay: 0.025 + Math.random() * 0.03 });
  }
}

function addFloat(x, y, text, color, big) {
  gameState.floats.push({ x: x, y: y, text: text, color: color, big: big, alpha: 1, vy: -1.2 });
}

function updateAirBtn() {
  var btn = document.getElementById('airBtn');
  if (!gameState || gameState.gameOver) { btn.style.display = 'none'; return; }
  btn.style.display = 'block';
  if (gameState.airstrikes > 0) {
    btn.className = 'ready';
    btn.textContent = 'STRIKE x' + gameState.airstrikes;
  } else {
    btn.className = 'locked';
    var needed = gameState.airstrikeThreshold - gameState.score;
    btn.textContent = 'STRIKE ' + (needed >= 1000 ? Math.ceil(needed / 1000) + 'k' : needed);
  }
}

/* =========================================================
   AIRSTRIKE
========================================================= */
function fireAirstrike() {
  var st = gameState;
  if (!st || st.airstrikes <= 0 || st.airPlane) return;
  st.airstrikes--;
  updateAirBtn();
  sfxAirstrike();
  st.airPlane = { x: -40, y: H * 0.15, speed: 6 };
}

document.getElementById('airBtn').addEventListener('click', function(e) { e.stopPropagation(); fireAirstrike(); });
document.getElementById('airBtn').addEventListener('touchend', function(e) { e.stopPropagation(); e.preventDefault(); fireAirstrike(); }, { passive: false });

/* =========================================================
   LIGHTNING STRIKE
========================================================= */
function fireLightning(targets) {
  var picked = [];
  var pool = targets.slice();
  for (var i = 0; i < 3 && pool.length > 0; i++) {
    var idx = Math.floor(Math.random() * pool.length);
    picked.push(pool[idx]);
    pool.splice(idx, 1);
  }
  picked.forEach(function(t) {
    t.hp -= Math.round(8 * gameState.zombieHpMult);
    if (t.hp < 0) t.hp = 0;
    gameState.lightningStrikes.push({ x: t.x, y: t.y, life: 18 });
    spawnParticles(t.x, t.y, '#ffff44', 8);
    addFloat(t.x, t.y - 20, 'ZAP!', '#ffff00', false);
  });
}

/* =========================================================
   UPDATE
========================================================= */
function update() {
  var st = gameState;
  if (!st || !st.running || st.gameOver) return;
  var now = Date.now();
  st.elapsed += 1 / 60;
  st.frame++;

  // Round clear
  if (st.kingDefeated) {
    st.roundClearTimer--;
    if (st.roundClearTimer <= 0) {
      var prev = { round: st.round, score: st.score, kills: st.kills, bossKills: st.bossKills, soldiers: st.soldiers, airstrikes: st.airstrikes };
      gameState = makeState(prev);
      return;
    }
  }

  // Reinforcements at 60s
  if (st.elapsed >= 60 && !st.reinforcementsAt60) {
    st.reinforcementsAt60 = true;
    st.soldiers += 10;
    addFloat(W / 2, H / 2, '+10 REINFORCEMENTS!', '#44ff88', true);
    sfxPickup();
  }

  // Weapon timer
  if (st.currentWeapon !== 'bullet' && st.weaponTimer > 0) {
    st.weaponTimer--;
    if (st.weaponTimer <= 0) st.currentWeapon = 'bullet';
  }

  // Airstrike award
  if (st.score >= st.airstrikeThreshold) {
    st.airstrikes++;
    st.airstrikeThreshold += 20000;
    addFloat(W / 2, H * 0.4, 'AIRSTRIKE READY!', '#ff4400', true);
    updateAirBtn();
  }

  // Spawn zombies
  var zombieRate = Math.max(400, 1600 - st.round * 80);
  if (now - st.lastZombieTime > zombieRate && !st.kingDefeated) {
    spawnZombie(); st.lastZombieTime = now;
  }

  // Spawn boss every ~60s
  if (now - st.lastBossTime > 60000 && !st.kingSpawned && !st.kingDefeated) {
    spawnBoss(); st.lastBossTime = now;
  }

  // Spawn soldier pickup
  if (now - st.lastSoldierTime > 5000) {
    var sx = 40 + Math.random() * (W - 80);
    st.soldierPickups = st.soldierPickups || [];
    st.soldierPickups.push({ x: sx, y: -20 });
    st.lastSoldierTime = now;
  }

  // Spawn weapon pickup
  if (now - st.lastWeaponTime > 15000) {
    var wnames = ['flamethrower', 'laser', 'machinegun'];
    var wx = 40 + Math.random() * (W - 80);
    st.weaponPickups.push({ x: wx, y: -20, weapon: wnames[Math.floor(Math.random() * wnames.length)] });
    st.lastWeaponTime = now;
  }

  // Spawn lightning pickup
  if (now - st.lastLightningTime > 22000) {
    st.lightningPickups.push({ x: 40 + Math.random() * (W - 80), y: -20 });
    st.lastLightningTime = now;
  }

  // Spawn car
  if (now - st.lastCarTime > 12000) {
    var types = ['regular', 'police', 'ambulance'];
    var fromLeft = Math.random() < 0.5;
    var carHp = 50;
    st.cars.push({ x: fromLeft ? -60 : W + 60, y: H * 0.55 + (Math.random() - 0.5) * 80, speed: fromLeft ? 2.5 : -2.5, hp: carHp, maxHp: carHp, type: types[Math.floor(Math.random() * types.length)] });
    st.lastCarTime = now;
  }

  // Squad firing
  var squadY = H - 80;
  st.fireTimer++;
  var wc = WEAPONS[st.currentWeapon];
  if (st.fireTimer >= wc.rate && st.soldiers > 0) {
    st.fireTimer = 0;
    var targets = st.zombies.concat(st.bosses).filter(function(z) {
      return Math.abs(z.x - st.squadX) < wc.range * 2 && z.y > 0;
    });
    if (st.currentWeapon === 'laser' && targets.length > 0) {
      // Laser beam — instant hit closest
      targets.sort(function(a, b) { return a.y - b.y; });
      var lt = targets[0];
      lt.hp -= wc.attack * (st.soldiers * 0.3 + 1);
      sfxLaser();
    } else {
      var spread = Math.min(st.soldiers, 12);
      for (var i = 0; i < spread; i++) {
        var bx = st.squadX + (i - spread / 2) * 12 + (Math.random() - 0.5) * 8;
        st.bullets.push({ x: bx, y: squadY - 10, vy: -(8 + Math.random() * 2), vx: (Math.random() - 0.5) * 1.5, weapon: st.currentWeapon });
        if (i === 0) sfxShoot();
      }
    }
  }

  // Move bullets
  st.bullets = st.bullets.filter(function(b) {
    b.x += b.vx; b.y += b.vy;
    return b.y > -20 && b.y < H + 20 && b.x > -20 && b.x < W + 20;
  });

  // Move zombies & check collisions
  var bHits = new Set();
  var zKill = [];
  st.zombies.forEach(function(z, zi) {
    z.y += z.speed;
    // Bullet hits
    st.bullets.forEach(function(b, bi) {
      if (bHits.has(bi)) return;
      var dx = b.x - z.x, dy = b.y - z.y;
      if (Math.abs(dx) < 16 && Math.abs(dy) < 20) {
        var dmg = WEAPONS[b.weapon || 'bullet'].attack * (1 + st.soldiers * 0.05);
        z.hp -= dmg;
        bHits.add(bi);
        spawnParticles(z.x, z.y, '#88ff44', 3);
      }
    });
    if (z.hp <= 0) { zKill.push(zi); return; }
    // Reached squad
    if (z.y >= squadY) {
      z.y = -30; z.x = Math.random() * W;
      st.soldiers = Math.max(0, st.soldiers - 1);
      spawnParticles(st.squadX, squadY, '#ff4444', 8);
      addFloat(st.squadX, squadY - 20, '-1 SOLDIER', '#ff4444', false);
      if (st.soldiers <= 0) { triggerGameOver(); return; }
    }
  });
  st.bullets = st.bullets.filter(function(_, i) { return !bHits.has(i); });
  zKill.reverse().forEach(function(zi) {
    var z = st.zombies[zi];
    st.score += z.type === 'special' ? 150 : 100;
    st.kills++;
    spawnParticles(z.x, z.y, '#44ff88', 6);
    addFloat(z.x, z.y, z.type === 'special' ? '+150' : '+100', '#ffe044', false);
    sfxZombieDie();
    st.zombies.splice(zi, 1);
  });

  // Boss movement & hits
  var bossKill = [];
  st.bosses.forEach(function(boss, bi) {
    boss.y += boss.speed;
    st.bullets.forEach(function(b, bui) {
      if (bHits.has('bo' + bui)) return;
      var dx = b.x - boss.x, dy = b.y - boss.y;
      if (Math.abs(dx) < 28 && Math.abs(dy) < 36) {
        var dmg = WEAPONS[b.weapon || 'bullet'].attack * (1 + st.soldiers * 0.05);
        boss.hp -= dmg;
        bHits.add('bo' + bui);
        spawnParticles(boss.x, boss.y, '#ff4444', 2);
      }
    });
    if (boss.hp <= 0) { bossKill.push(bi); return; }
    if (boss.y >= squadY) {
      boss.y = -60; boss.x = Math.random() * W;
      st.soldiers = Math.max(0, st.soldiers - 3);
      spawnParticles(st.squadX, squadY, '#ff0000', 14);
      addFloat(st.squadX, squadY - 30, '-3 SOLDIERS', '#ff2222', true);
      if (st.soldiers <= 0) { triggerGameOver(); return; }
    }
  });
  bossKill.reverse().forEach(function(bi) {
    var boss = st.bosses[bi];
    st.score += 2000;
    st.bossKills++;
    spawnParticles(boss.x, boss.y, '#ffd700', 20);
    addFloat(boss.x, boss.y, '+2000 KING!', '#ffd700', true);
    sfxZombieDie();
    st.bosses.splice(bi, 1);
    st.kingSpawned = false;
    st.kingDefeated = true;
    st.roundClearTimer = 180;
    st.lastBossTime = Date.now();
  });

  // Move pickups down
  var pickupSpeed = 1.5;
  st.soldierPickups = (st.soldierPickups || []).filter(function(p) {
    p.y += pickupSpeed;
    var dx = p.x - st.squadX, dy = p.y - squadY;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
      var add = 3 + Math.floor(Math.random() * 4);
      st.soldiers += add;
      addFloat(p.x, p.y, '+' + add + ' SOLDIER' + (add > 1 ? 'S' : ''), '#44ff88', false);
      sfxPickup();
      return false;
    }
    return p.y < H + 40;
  });

  st.weaponPickups = st.weaponPickups.filter(function(p) {
    p.y += pickupSpeed;
    var dx = p.x - st.squadX, dy = p.y - squadY;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
      st.currentWeapon = p.weapon;
      st.weaponTimer = WEAPONS[p.weapon].dur;
      addFloat(p.x, p.y, WEAPONS[p.weapon].name.toUpperCase() + '!', WEAPONS[p.weapon].color, true);
      sfxPickup();
      return false;
    }
    return p.y < H + 40;
  });

  st.lightningPickups = st.lightningPickups.filter(function(p) {
    p.y += pickupSpeed;
    var dx = p.x - st.squadX, dy = p.y - squadY;
    if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
      var all = st.zombies.concat(st.bosses);
      if (all.length > 0) fireLightning(all);
      addFloat(p.x, p.y, 'LIGHTNING!', '#ffff00', true);
      sfxPickup();
      return false;
    }
    return p.y < H + 40;
  });

  // Cars
  st.cars = st.cars.filter(function(car) {
    car.x += car.speed;
    // Bullet hits
    st.bullets.forEach(function(b, bi) {
      if (bHits.has('c' + bi)) return;
      var dx = b.x - car.x, dy = b.y - car.y;
      if (Math.abs(dx) < 26 && Math.abs(dy) < 16) {
        car.hp -= 1; bHits.add('c' + bi);
      }
    });
    if (car.hp <= 0) {
      spawnParticles(car.x, car.y, '#ff6600', 20);
      addFloat(car.x, car.y, '+500 BOOM!', '#ff6600', true);
      st.score += 500;
      return false;
    }
    return car.x > -100 && car.x < W + 100;
  });

  // Airplane + bombs
  if (st.airPlane) {
    st.airPlane.x += st.airPlane.speed;
    if (st.frame % 18 === 0) {
      st.bombs.push({ x: st.airPlane.x, y: st.airPlane.y, vy: 3 });
    }
    if (st.airPlane.x > W + 60) st.airPlane = null;
  }
  st.bombs = st.bombs.filter(function(b) {
    b.y += b.vy; b.vy += 0.15;
    var allTargets = st.zombies.concat(st.bosses);
    var hit = false;
    allTargets.forEach(function(t) {
      var dx = b.x - t.x, dy = b.y - t.y;
      if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
        t.hp -= 15 * st.zombieHpMult;
        spawnParticles(t.x, t.y, '#ff6600', 8);
        hit = true;
      }
    });
    if (b.y > H) {
      spawnParticles(b.x, b.y, '#ff4400', 12);
      return false;
    }
    return !hit;
  });

  // Lightning strike effects
  st.lightningStrikes = st.lightningStrikes.filter(function(ls) {
    ls.life--;
    return ls.life > 0;
  });

  // Particles
  st.particles = st.particles.filter(function(p) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= p.decay;
    return p.life > 0;
  });

  // Float text
  st.floats = st.floats.filter(function(f) {
    f.y += f.vy; f.alpha -= 0.015;
    return f.alpha > 0;
  });

  updateAirBtn();
}

/* =========================================================
   DRAW
========================================================= */
function draw() {
  var st = gameState;
  if (!st) return;
  var squadY = H - 80;

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Ground line
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, squadY + 20, W, H - squadY - 20);
  ctx.fillStyle = '#2a3a2a';
  ctx.fillRect(0, squadY + 18, W, 4);

  // Cars
  st.cars.forEach(drawCar);

  // Pickups
  (st.soldierPickups || []).forEach(function(p) { drawPickup(p.x, p.y, 'SOLDIER', '#44ff88'); });
  st.weaponPickups.forEach(function(p) {
    var wc = WEAPONS[p.weapon];
    drawPickup(p.x, p.y, wc.name.slice(0, 2).toUpperCase(), wc.color);
  });
  st.lightningPickups.forEach(function(p) { drawPickup(p.x, p.y, 'ZAP', '#ffff44'); });

  // Bullets
  st.bullets.forEach(drawBullet);

  // Laser beam
  if (st.currentWeapon === 'laser') {
    var targets = st.zombies.concat(st.bosses).filter(function(z) { return z.y > 0; });
    if (targets.length > 0) {
      targets.sort(function(a, b) { return a.y - b.y; });
      var lt = targets[0];
      ctx.save();
      ctx.strokeStyle = WEAPONS.laser.color;
      ctx.shadowColor = WEAPONS.laser.glow;
      ctx.shadowBlur = 16;
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.7 + Math.random() * 0.3;
      ctx.beginPath();
      ctx.moveTo(st.squadX, squadY - 10);
      ctx.lineTo(lt.x, lt.y);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Zombies
  st.zombies.forEach(function(z) {
    drawZombie(z.x, z.y, 0.85, z.hp, z.maxHp, z.type);
  });

  // Bosses
  st.bosses.forEach(function(boss) {
    drawZombie(boss.x, boss.y, 1.5, boss.hp, boss.maxHp, 'boss');
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(Math.ceil(boss.hp) + '/' + boss.maxHp, boss.x, boss.y - 62);
  });

  // Airplane + bombs
  if (st.airPlane) drawAirplane(st.airPlane);
  st.bombs.forEach(drawBomb);

  // Lightning effects
  st.lightningStrikes.forEach(function(ls) {
    ctx.save();
    ctx.strokeStyle = '#ffff44';
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 20;
    ctx.lineWidth = 3;
    ctx.globalAlpha = ls.life / 18;
    ctx.beginPath();
    ctx.moveTo(ls.x, 0);
    ctx.lineTo(ls.x + (Math.random() - 0.5) * 20, ls.y / 2);
    ctx.lineTo(ls.x, ls.y);
    ctx.stroke();
    ctx.restore();
  });

  // Particles
  st.particles.forEach(drawParticle);

  // Squad
  if (st.soldiers > 0) {
    var maxRow = 12, sp = 14;
    var cnt = Math.min(st.soldiers, maxRow * 2);
    var r1 = Math.min(cnt, maxRow), r2 = cnt - r1;
    for (var i = 0; i < r1; i++) drawSoldier(st.squadX - (r1 - 1) * sp / 2 + i * sp, squadY - 10, 0.75);
    if (r2 > 0) for (var j = 0; j < r2; j++) drawSoldier(st.squadX - (r2 - 1) * sp / 2 + j * sp, squadY - 26, 0.65);
    if (st.soldiers > maxRow * 2) {
      ctx.fillStyle = '#ffe044'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
      ctx.fillText('+' + (st.soldiers - maxRow * 2) + ' more', st.squadX, squadY + 14);
    }
  }

  // Round clear flash
  if (st.kingDefeated && st.roundClearTimer > 0) {
    var a = Math.min(1, st.roundClearTimer / 60) * 0.45;
    ctx.fillStyle = 'rgba(255,215,0,' + a + ')';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 28px Arial Black'; ctx.textAlign = 'center';
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20;
    ctx.fillText('ROUND ' + st.round + ' CLEAR!', W / 2, H / 2);
    ctx.shadowBlur = 0;
  }

  // Float text
  st.floats.forEach(function(f) {
    ctx.save(); ctx.globalAlpha = f.alpha;
    ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 10;
    ctx.font = (f.big ? 'bold 18px' : 'bold 13px') + ' Arial';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  });

  drawHUD();
}

/* =========================================================
   GAME OVER
========================================================= */
function triggerGameOver() {
  var st = gameState;
  st.gameOver = true;
  st.running = false;
  document.getElementById('airBtn').style.display = 'none';
  document.getElementById('cogBtn').style.display = 'none';
  var m = Math.floor(st.elapsed / 60), s = Math.floor(st.elapsed % 60);
  document.getElementById('finalStats').innerHTML =
    '<div class="stat-line">Round: ' + st.round + '</div>' +
    '<div class="stat-line">Score: ' + st.score.toLocaleString() + '</div>' +
    '<div class="stat-line">Kills: ' + st.kills + '</div>' +
    '<div class="stat-line">Bosses: ' + st.bossKills + '</div>' +
    '<div class="stat-line">Survived: ' + m + 'm ' + s + 's</div>';
  document.getElementById('gameOverScreen').style.display = 'flex';
  cancelAnimationFrame(animFrame);
}

/* =========================================================
   GAME LOOP
========================================================= */
function loop() {
  if (!gameState || gameState.gameOver) return;
  update();
  draw();
  animFrame = requestAnimationFrame(loop);
}

/* =========================================================
   START GAME
========================================================= */
function startGame(prev) {
  if (animFrame) cancelAnimationFrame(animFrame);
  gameState = makeState(prev || null);
  dragX = W / 2;
  document.getElementById('cogBtn').style.display = 'flex';
  document.getElementById('airBtn').style.display = 'block';
  updateAirBtn();
  loop();
}

/* =========================================================
   TOUCH / MOUSE INPUT
========================================================= */
canvas.addEventListener('touchstart', function(e) {
  // Only handle game touches (not title screen — title is handled separately)
  if (!gameState || !gameState.running) return;
  e.preventDefault();
  dragX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  if (!gameState || !gameState.running) return;
  e.preventDefault();
  var x = e.touches[0].clientX;
  if (dragX !== null) gameState.squadX += (x - dragX) * 1.0;
  gameState.squadX = Math.max(30, Math.min(W - 30, gameState.squadX));
  dragX = x;
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  if (!gameState || !gameState.running) return;
  dragX = null;
}, { passive: true });

canvas.addEventListener('mousemove', function(e) {
  if (!gameState || !gameState.running) return;
  gameState.squadX = e.clientX;
});

</script>

<!-- YouTube IFrame API — must be global scope -->

<script>
var ytReady = false;
var ytPendingPlay = false;

function onYouTubeIframeAPIReady() {
  ytReady = true;
  var url = document.getElementById('ytInput').value.trim() || 'https://youtu.be/XMcbjp4Sq4M';
  var info = ytExtract(url);
  if (!info) return;
  var pvars = { autoplay: 1, playsinline: 1, controls: 0, mute: 1, origin: window.location.origin };
  var vidId;
  if (info.type === 'playlist') { pvars.listType = 'playlist'; pvars.list = info.id; pvars.shuffle = 1; }
  else { vidId = info.id; pvars.loop = 1; pvars.playlist = info.id; }
  var cfg = {
    height: '200', width: '200', playerVars: pvars,
    events: {
      onReady: function(e) {
        e.target.setVolume(Math.round(musicVolume * 100));
        if (ytPendingPlay) {
          e.target.unMute(); e.target.playVideo();
          ytPendingPlay = false;
          document.getElementById('musicStatus').textContent = 'Playing';
        }
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED || e.data === YT.PlayerState.UNSTARTED) e.target.playVideo();
      }
    }
  };
  if (vidId) cfg.videoId = vidId;
  ytPlayer = new YT.Player('ytPlayerContainer', cfg);
}
</script>
